<svg width="680" viewBox="0 0 680 1120" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Color definitions as inline styles since no CSS vars in standalone SVG -->
<!-- Teal: fill=#E1F5EE stroke=#0F6E56 text=#085041 -->
<!-- Blue:  fill=#E6F1FB stroke=#185FA5 text=#0C447C -->
<!-- Green: fill=#EAF3DE stroke=#3B6D11 text=#27500A -->
<!-- Amber: fill=#FAEEDA stroke=#854F0B text=#633806 -->
<!-- Red:   fill=#FCEBEB stroke=#A32D2D text=#791F1F -->
<!-- Purple:fill=#EEEDFE stroke=#534AB7 text=#3C3489 -->
<!-- Gray:  fill=#F1EFE8 stroke=#5F5E5A text=#444441 -->

<!-- MAIN (top) -->
<g>
  <rect x="240" y="20" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="38" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Main screen</text>
  <text x="340" y="54" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">1 / 2 / C / X keys</text>
</g>

<!-- arrow main -> game init -->
<line x1="340" y1="64" x2="340" y2="104" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="348" y="86" dominant-baseline="central" font-size="12" fill="#5F5E5A">1 or 2 key</text>

<!-- GAME INIT -->
<g>
  <rect x="200" y="104" width="280" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="124" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Game init</text>
  <text x="340" y="142" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Init PlayerState for each player</text>
</g>

<!-- PlayerState data box -->
<g>
  <rect x="20" y="90" width="160" height="76" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="100" y="110" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">PlayerState (each)</text>
  <text x="100" y="128" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">lives, current_level</text>
  <text x="100" y="144" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">level_snapshot, score</text>
  <text x="100" y="160" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">is_alive: bool</text>
</g>
<line x1="180" y1="128" x2="200" y2="128" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- game init -> set active player -->
<line x1="340" y1="160" x2="340" y2="200" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- SET ACTIVE PLAYER -->
<g>
  <rect x="200" y="200" width="280" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="220" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Set active player</text>
  <text x="340" y="238" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Restore level_snapshot if exists</text>
</g>

<!-- set active -> start level -->
<line x1="340" y1="256" x2="340" y2="296" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- START LEVEL -->
<g>
  <rect x="210" y="296" width="260" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="316" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Start level</text>
  <text x="340" y="334" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Init or restore enemy layout</text>
</g>

<!-- start level -> run level -->
<line x1="340" y1="352" x2="340" y2="392" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- RUN LEVEL -->
<g>
  <rect x="190" y="392" width="300" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="412" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Run level</text>
  <text x="340" y="430" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Game loop, input, rendering</text>
</g>

<!-- run level -> level complete -->
<line x1="490" y1="420" x2="560" y2="420" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="492" y="412" dominant-baseline="central" font-size="12" fill="#5F5E5A">all aliens cleared</text>

<!-- LEVEL COMPLETE -->
<g>
  <rect x="560" y="398" width="100" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="610" y="416" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">Level</text>
  <text x="610" y="432" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">complete</text>
  <text x="610" y="448" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">Show lives</text>
</g>

<!-- level complete -> set active player (loop back) -->
<path d="M610 398 L610 228 L480 228" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="618" y="316" dominant-baseline="central" font-size="12" fill="#5F5E5A">level+1</text>
<text x="618" y="330" dominant-baseline="central" font-size="12" fill="#5F5E5A">same player</text>

<!-- run level -> player killed -->
<line x1="340" y1="448" x2="340" y2="508" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="348" y="484" dominant-baseline="central" font-size="12" fill="#5F5E5A">ship destroyed</text>

<!-- PLAYER KILLED -->
<g>
  <rect x="200" y="508" width="280" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="528" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Player killed</text>
  <text x="340" y="546" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Decrement active player lives</text>
</g>

<!-- player killed -> check lives -->
<line x1="340" y1="564" x2="340" y2="604" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- CHECK LIVES / PLAYERS -->
<g>
  <rect x="180" y="604" width="320" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="624" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Check lives + active players</text>
  <text x="340" y="642" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Decide next action</text>
</g>

<!-- branch: lives > 0, 1P -> run level -->
<path d="M180 620 L100 620 L100 420 L190 420" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="30" y="524" dominant-baseline="central" font-size="12" fill="#5F5E5A">lives &gt; 0,</text>
<text x="30" y="538" dominant-baseline="central" font-size="12" fill="#5F5E5A">1P mode</text>

<!-- branch: lives > 0, 2P -> save snapshot -->
<line x1="340" y1="660" x2="340" y2="700" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="348" y="682" dominant-baseline="central" font-size="12" fill="#5F5E5A">lives &gt; 0, 2P mode</text>

<!-- SAVE SNAPSHOT + SWITCH -->
<g>
  <rect x="170" y="700" width="340" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="720" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Save snapshot + switch player</text>
  <text x="340" y="738" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Freeze level state, swap active player</text>
</g>

<!-- switch -> set active player -->
<path d="M510 728 L560 728 L560 228 L480 228" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="566" y="490" dominant-baseline="central" font-size="12" fill="#5F5E5A">restore</text>
<text x="566" y="504" dominant-baseline="central" font-size="12" fill="#5F5E5A">other player</text>

<!-- branch: lives=0, other alive -> drop to 1P -->
<line x1="500" y1="632" x2="548" y2="632" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="502" y="622" dominant-baseline="central" font-size="12" fill="#5F5E5A">lives=0, other alive</text>

<!-- DROP TO 1P -->
<g>
  <rect x="548" y="610" width="92" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="594" y="630" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Drop to</text>
  <text x="594" y="646" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">1P mode</text>
  <text x="594" y="660" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Mark dead</text>
</g>

<!-- drop to 1P -> set active player -->
<path d="M594 610 L594 580 L560 580 L560 228 L480 228" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- branch: all lives=0 -> game over -->
<line x1="340" y1="756" x2="340" y2="820" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="348" y="792" dominant-baseline="central" font-size="12" fill="#5F5E5A">all players lives=0</text>

<!-- GAME OVER -->
<g>
  <rect x="220" y="820" width="240" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="340" y="840" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#791F1F">Game over</text>
  <text x="340" y="858" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#A32D2D">Show final scores, both players</text>
</g>

<!-- game over -> score entry -->
<line x1="460" y1="848" x2="520" y2="848" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="462" y="838" dominant-baseline="central" font-size="12" fill="#5F5E5A">top 10 score</text>

<!-- SCORE ENTRY -->
<g>
  <rect x="520" y="826" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="580" y="844" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Score entry</text>
  <text x="580" y="860" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">(stub)</text>
</g>

<!-- score entry -> main bottom -->
<path d="M580 870 L580 940 L440 940" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- game over -> main bottom -->
<line x1="340" y1="876" x2="340" y2="940" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="348" y="916" dominant-baseline="central" font-size="12" fill="#5F5E5A">not top 10</text>

<!-- MAIN (bottom) -->
<g>
  <rect x="240" y="940" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="958" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Main screen</text>
  <text x="340" y="974" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Return after game over</text>
</g>

<!-- Legend -->
<rect x="20" y="1010" width="640" height="90" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="36" y="1032" dominant-baseline="central" font-size="12" fill="#5F5E5A">Legend:</text>
<rect x="80" y="1022" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="100" y="1032" dominant-baseline="central" font-size="12" fill="#5F5E5A">Navigation / UI</text>
<rect x="230" y="1022" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="250" y="1032" dominant-baseline="central" font-size="12" fill="#5F5E5A">Game flow</text>
<rect x="340" y="1022" width="14" height="14" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="360" y="1032" dominant-baseline="central" font-size="12" fill="#5F5E5A">Success</text>
<rect x="440" y="1022" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="460" y="1032" dominant-baseline="central" font-size="12" fill="#5F5E5A">Player event</text>
<rect x="560" y="1022" width="14" height="14" rx="3" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="580" y="1032" dominant-baseline="central" font-size="12" fill="#5F5E5A">End / exit</text>
<rect x="80" y="1050" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="100" y="1060" dominant-baseline="central" font-size="12" fill="#5F5E5A">2P logic / config</text>
<rect x="230" y="1050" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="250" y="1060" dominant-baseline="central" font-size="12" fill="#5F5E5A">Data structure</text>
<line x1="340" y1="1057" x2="370" y2="1057" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="4 3"/>
<text x="378" y="1060" dominant-baseline="central" font-size="12" fill="#5F5E5A">Reference / data flow</text>

</svg>
