name: CI / Build

on:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=src

      - name: Build exe
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Space_Attackers-windows
          path: dist/Space_Attackers.exe
          if-no-files-found: error
